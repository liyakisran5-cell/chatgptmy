<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BatAI – Smart Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--sidebar:#171717;--card:#1e1e1e;--border:#2a2a2a;--accent:#ff6b00;--accent2:#ff9500;--text:#ececec;--muted:#8e8e8e}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;overflow:hidden}
.sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px;flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:8px 0 20px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff}
.logo-name{font-size:1.1rem;font-weight:700;color:var(--text)}
.logo-name span{color:var(--accent)}
.new-chat-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity 0.2s;width:100%;margin-bottom:20px}
.new-chat-btn:hover{opacity:0.85}
.sidebar-label{font-size:0.65rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.chat-history{flex:1;overflow-y:auto}
.history-item{padding:9px 12px;border-radius:8px;font-size:0.78rem;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.history-item:hover{background:var(--card);color:var(--text)}
.sidebar-footer{border-top:1px solid var(--border);padding-top:14px;margin-top:10px}
.footer-info{font-size:0.68rem;color:var(--muted);text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:0.9rem;font-weight:600}
.model-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:0.7rem;color:var(--accent);font-weight:500}
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px}
.welcome-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:20px;box-shadow:0 8px 32px rgba(255,107,0,0.3)}
.welcome h2{font-size:1.6rem;font-weight:700;margin-bottom:8px}
.welcome p{color:var(--muted);font-size:0.85rem;max-width:400px;line-height:1.6}
.suggestions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:24px;max-width:560px}
.suggestion-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:0.78rem;color:var(--text);cursor:pointer;transition:all 0.2s;text-align:left;line-height:1.4}
.suggestion-btn:hover{border-color:var(--accent);color:var(--accent)}
.msg{display:flex;gap:12px;max-width:800px;width:100%;margin:0 auto}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.msg.user .msg-avatar{background:var(--card);border:1px solid var(--border);color:var(--text)}
.msg-content{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:0.85rem;line-height:1.7;max-width:85%}
.msg.user .msg-content{background:var(--accent);border-color:var(--accent);color:#fff}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:4px 0}
.typing-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.input-area{padding:16px 24px 20px;border-top:1px solid var(--border)}
.input-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;gap:10px;padding:12px 16px;transition:border-color 0.2s;max-width:800px;margin:0 auto}
.input-wrap:focus-within{border-color:var(--accent)}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:0.85rem;resize:none;max-height:120px;line-height:1.5}
.chat-input::placeholder{color:var(--muted)}
.send-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:9px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;transition:opacity 0.2s}
.send-btn:hover{opacity:0.85}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.input-hint{text-align:center;font-size:0.65rem;color:var(--muted);margin-top:8px;max-width:800px;margin-left:auto;margin-right:auto}
@media(max-width:640px){.sidebar{display:none}.main{width:100%}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">B</div>
    <div class="logo-name">Bat<span>AI</span></div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">✏️ New Chat</button>
  <div class="sidebar-label">Recent Chats</div>
  <div class="chat-history" id="chatHistory"></div>
  <div class="sidebar-footer">
    <div class="footer-info">BatAI · Free Forever · 🇵🇰</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">BatAI Assistant</div>
    <div class="model-badge">⚡ BatAI Pro</div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Main hoon <span style="color:var(--accent)">BatAI</span>!</h2>
      <p>Tumhara smart assistant — Urdu aur English dono mein baat karta hoon!</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('Mujhe Python coding sikhao')">💻 Python coding sikhao</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Pakistan ke baare mein batao')">🇵🇰 Pakistan ke baare mein batao</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Ek funny joke sunao')">😄 Funny joke sunao</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Online paise kaise kamayein?')">💰 Online paise kamao</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Meri English improve karo')">📚 English improve karo</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Ek story likho')">✍️ Story likho</button>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="chatInput" class="chat-input" placeholder="Koi bhi sawaal pucho... (Urdu ya English)" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">BatAI galtiyan kar sakta hai — important info verify karo</div>
  </div>
</div>

<script>
  var conversation = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
  }

  function newChat() {
    if (conversation.length > 0) {
      var first = conversation.find(m => m.role === 'user');
      if (first) {
        var item = document.createElement('div');
        item.className = 'history-item';
        item.textContent = first.content.substring(0, 35) + '...';
        document.getElementById('chatHistory').prepend(item);
      }
    }
    conversation = [];
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Main hoon <span style="color:var(--accent)">BatAI</span>!</h2>
        <p>Tumhara smart assistant — Urdu aur English dono mein baat karta hoon!</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion('Mujhe Python coding sikhao')">💻 Python coding sikhao</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Pakistan ke baare mein batao')">🇵🇰 Pakistan ke baare mein batao</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Ek funny joke sunao')">😄 Funny joke sunao</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Online paise kaise kamayein?')">💰 Online paise kamao</button>
        </div>
      </div>`;
  }

  function hideWelcome() {
    var w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function addMessage(role, content) {
    hideWelcome();
    var msgs = document.getElementById('messages');
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML =
      '<div class="msg-avatar">' + (role === 'ai' ? 'B' : 'U') + '</div>' +
      '<div class="msg-content">' + formatText(content) + '</div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    hideWelcome();
    var msgs = document.getElementById('messages');
    var div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing';
    div.innerHTML = '<div class="msg-avatar">B</div><div class="msg-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    var t = document.getElementById('typing');
    if (t) t.remove();
  }

  function formatText(text) {
    text = text.replace(/```([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;overflow-x:auto;margin:6px 0">$1</pre>');
    text = text.replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.1);padding:2px 5px;border-radius:4px">$1</code>');
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  async function sendMessage() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    conversation.push({ role: 'user', content: text });
    addTyping();

    try {
      var res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversation })
      });

      var data = await res.json();
      var reply = data.reply;

      if (!reply) throw new Error('No reply');

      removeTyping();
      addMessage('ai', reply);
      conversation.push({ role: 'assistant', content: reply });

    } catch (e) {
      removeTyping();
      addMessage('ai', 'Maafi chahta hoon — kuch error aa gaya. Dobara try karo! 🙏');
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('chatInput').focus();
  }
</script>
</body>
</html>
